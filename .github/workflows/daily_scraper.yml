name: Daily Scrapers

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  publicnotice:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4 pytz pdfplumber
      - run: python publicnoticecolorado/main.py
        env:
          DECODO_TOKEN: ${{ secrets.DECODO_TOKEN }}
          CAPTCHA_KEY:  ${{ secrets.CAPTCHA_KEY }}
          WEBHOOK_URL:  ${{ secrets.WEBHOOK_URL }}
          PYTHONUNBUFFERED: "1"
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: publicnotice-output
          path: |
            notices.csv
            notices.json

  publicrecords:
    runs-on: ubuntu-latest
    needs: publicnotice
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4 pytz
      - run: python publicrecordsearch/main.py
        env:
          DECODO_TOKEN: ${{ secrets.DECODO_TOKEN }}
          WEBHOOK_URL:  ${{ secrets.WEBHOOK_URL }}
          PYTHONUNBUFFERED: "1"
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: publicrecords-output
          path: |
            elpaso_records.csv
            elpaso_records.json

  publicnoticepa:
    runs-on: ubuntu-latest
    needs: publicrecords
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4 pytz pdfplumber
      - run: python publicnoticepa/main.py
        env:
          DECODO_TOKEN: ${{ secrets.DECODO_TOKEN }}
          CAPTCHA_KEY:  ${{ secrets.CAPTCHA_KEY }}
          WEBHOOK_URL:  ${{ secrets.WEBHOOK_URL }}
          PYTHONUNBUFFERED: "1"
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: publicnoticepa-output
          path: |
            pa_notices.csv
            pa_notices.json

  chestercountypa:
    runs-on: ubuntu-latest
    needs: publicnoticepa
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install requests pytz
      - run: python chestercountypa/main.py
        env:
          CAPTCHA_KEY:       ${{ secrets.CAPTCHA_KEY }}
          DECODO_PROXY_USER: ${{ secrets.DECODO_PROXY_USER }}
          DECODO_PROXY_PASS: ${{ secrets.DECODO_PROXY_PASS }}
          WEBHOOK_URL:       ${{ secrets.WEBHOOK_URL }}
          PYTHONUNBUFFERED: "1"
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: chestercountypa-output
          path: |
            chester_records.csv
            chester_records.json

